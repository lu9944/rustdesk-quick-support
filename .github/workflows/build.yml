name: Build

# 触发条件：
#   1. 手动触发（Actions 页面点 Run workflow，可填服务器 IP / 密钥，默认发布预发布版 Release）
#   2. 推送 v* 形式的 tag（自动发布正式版 Release；此时从 Secrets 读取配置）
on:
  workflow_dispatch:
    inputs:
      server:
        description: "中继服务器地址（域名或 IP，留空用默认 rs-ny.rustdesk.com）"
        required: false
        default: ""
      key:
        description: "服务器密钥（服务器未开启认证则留空）"
        required: false
        default: ""
      socks5:
        description: "Socks5 代理 host:port（可选）"
        required: false
        default: ""
      publish:
        description: "是否发布到 Release（自动生成预发布 tag）"
        required: false
        default: "true"
  push:
    tags:
      - 'v*'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  # ───────────────────────────────────────────────
  # 各平台原生构建（矩阵）
  # ───────────────────────────────────────────────
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            bundles: dmg
          - os: macos-latest
            label: macos-x86_64
            target: x86_64-apple-darwin
            bundles: dmg

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            file

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Generate full icon set (.ico / .icns / png)
        # 从现有最高清 PNG 生成所有平台所需图标，确保 macOS .icns 存在
        run: cargo tauri icon src-tauri/icons/128x128@2x.png

      - name: Write .env (编译期内置到二进制)
        # build.rs 在编译期读取 .env，用 cargo:rustc-env 固化，
        # 运行时无需 .env。手动触发时优先用 inputs，回退到 Secrets。
        shell: bash
        run: |
          cat > .env <<EOF
          RUSTDESK_SERVER=${SERVER}
          RUSTDESK_KEY=${KEY}
          RUSTDESK_SOCKS5=${SOCKS5}
          RUSTDESK_ID=
          RUSTDESK_PASSWORD=
          EOF
          echo "---- .env (key/redacted) ----"
          sed -E 's/(RUSTDESK_KEY)=.*/\1=<redacted>/' .env
        env:
          SERVER: ${{ inputs.server || secrets.RUSTDESK_SERVER }}
          KEY: ${{ inputs.key || secrets.RUSTDESK_KEY }}
          SOCKS5: ${{ inputs.socks5 || secrets.RUSTDESK_SOCKS5 }}

      - name: Build (${{ matrix.target }})
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-quicksupport-${{ matrix.label }}
          if-no-files-found: error
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.exe
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.dmg

  # ───────────────────────────────────────────────
  # 发布 Release
  #   - 推 v* tag：正式 Release，tag 用推送的 tag
  #   - 手动触发且 publish=true：预发布，tag 自动生成 v0.1.0-ci.<run>-<sha7>
  # ───────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Compute release tag
        id: rel
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}"        >> "$GITHUB_OUTPUT"
            echo "prerelease=false"              >> "$GITHUB_OUTPUT"
          else
            SHORT="${GITHUB_SHA::7}"
            echo "tag=v0.1.0-ci.${GITHUB_RUN_NUMBER}-${SHORT}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true"               >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.tag }}
          prerelease: ${{ steps.rel.outputs.prerelease }}
          generate_release_notes: true
          # 递归匹配：产物嵌套在 nsis/ dmg/ appimage/ deb/ 子目录
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
